<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="page-header">
                <h2 class="text-xl font-bold text-gray-900">Companies</h2>
                <a href="company-create.html" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;">
                    + Create Company
                </a>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading companies...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No companies yet</h3>
                <p class="text-gray-500 mb-6">Create your first company to get started.</p>
                <a href="company-create.html" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;text-decoration:none;">
                    + Create Company
                </a>
            </div>

            <div id="rabbit-search" class="hidden"></div>
            <div id="rabbit-table" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script src="js/rabbit-actions.js"></script>
    <script>
        let companiesData = [];

        (async function() {
            renderSidebar('companies');
            const user = await requireAuth();
            if (!user) return;

            const isSuperAdmin = (user.companies || []).some(c => c.role && c.role.name === 'SUPER_ADMIN');
            if (!isSuperAdmin) {
                window.location.href = 'dashboard.html';
                return;
            }

            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.userFeature) features.userFeature = true;
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });

            showAdminNavLinks(features);
            document.getElementById('loading').classList.add('hidden');
            await loadCompanies();
        })();

        async function loadCompanies() {
            const result = await apiCall('GET', '/companies');
            document.getElementById('loading').classList.add('hidden');

            if (!result || result.status !== 200) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            companiesData = result.data;

            if (companiesData.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('rabbit-search').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.remove('hidden');

            RabbitSearch.render({
                containerId: 'rabbit-search',
                placeholder: 'Search companies...',
                sortFields: [
                    { key: 'name', label: 'Name' },
                    { key: 'city', label: 'City' },
                    { key: 'createdAt', label: 'Date' }
                ],
                onSearch: function(query) {
                    RabbitTable.search('rabbit-table', query);
                },
                onSort: function(field, order) {
                    var tableData = companiesData.slice();
                    tableData.sort(function(a, b) {
                        var va = a[field] || '';
                        var vb = b[field] || '';
                        if (field === 'createdAt') {
                            va = new Date(va).getTime();
                            vb = new Date(vb).getTime();
                            return order === 'asc' ? va - vb : vb - va;
                        }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                    companiesData = tableData;
                    renderCompanyTable();
                }
            });

            renderCompanyTable();
        }

        function renderCompanyTable() {
            RabbitTable.render({
                containerId: 'rabbit-table',
                type: 'companies',
                columns: [
                    { key: 'name', label: 'Name', sortable: true },
                    { key: 'city', label: 'City', sortable: true },
                    { key: 'state', label: 'State', sortable: true },
                    { key: 'country', label: 'Country', sortable: true },
                    { key: 'contactNumber', label: 'Contact', sortable: true },
                    {
                        key: 'active',
                        label: 'Status',
                        sortable: false,
                        render: function(row) {
                            var cls = row.active ? 'badge-active' : 'badge-inactive';
                            var txt = row.active ? 'Active' : 'Inactive';
                            return '<span class="badge ' + cls + '">' + txt + '</span>';
                        }
                    },
                    {
                        key: 'createdAt',
                        label: 'Created',
                        sortable: true,
                        render: function(row) {
                            return new Date(row.createdAt).toLocaleDateString();
                        }
                    }
                ],
                data: companiesData.map(function(c) {
                    return { id: c.companyId, name: c.name, city: c.city, state: c.state, country: c.country, contactNumber: c.contactNumber, active: c.active, createdAt: c.createdAt };
                }),
                selected: [],
                onRefresh: function() { loadCompanies(); },
                actions: function(row) {
                    return RabbitActions.renderActions('companies', row);
                },
                searchFields: ['name', 'city', 'state', 'country', 'contactNumber']
            });
        }
    </script>
</body>
</html>
