<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">Rabbit</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                    Dashboard
                </a>
                <a href="companies.html" class="sidebar-link active" id="nav-companies">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    Companies
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="logout.html" class="text-red-400 hover:text-red-300 text-sm">Logout</a>
            </div>
        </aside>

        <div class="main-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-900">Companies</h2>
                <button onclick="openCreateModal()" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;">
                    + Create Company
                </button>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:#2563eb;border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading companies...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No companies yet</h3>
                <p class="text-gray-500 mb-6">Create your first company to get started.</p>
                <button onclick="openCreateModal()" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;">
                    + Create Company
                </button>
            </div>

            <div id="table-wrapper" class="hidden table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>City</th>
                            <th>State</th>
                            <th>Country</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="companies-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Create Company</h3>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-global-error" class="hidden global-error"></div>

                <form id="createCompanyForm" onsubmit="handleCreateCompany(event)" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="label">Company Name *</label>
                        <input type="text" name="name" required class="form-input" placeholder="Acme Corp">
                    </div>

                    <div class="mb-4">
                        <label class="label">Description</label>
                        <textarea name="aboutCompany" class="form-input" rows="2" placeholder="Brief description"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="label">Address Line 1 *</label>
                            <input type="text" name="addressLine1" required class="form-input" placeholder="123 Main St">
                        </div>
                        <div>
                            <label class="label">Address Line 2</label>
                            <input type="text" name="addressLine2" class="form-input" placeholder="Suite 100">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="label">City *</label>
                            <input type="text" name="city" required class="form-input" placeholder="Mumbai">
                        </div>
                        <div>
                            <label class="label">State *</label>
                            <input type="text" name="state" required class="form-input" placeholder="Maharashtra">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="label">Country *</label>
                            <input type="text" name="country" required class="form-input" placeholder="India">
                        </div>
                        <div>
                            <label class="label">PIN Code *</label>
                            <input type="text" name="pinCode" required class="form-input" placeholder="400001" maxlength="6" pattern="[0-9]{6}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="label">Contact Number *</label>
                        <input type="text" name="contactNumber" required class="form-input" placeholder="9876543210" maxlength="10">
                    </div>

                    <div class="mb-4">
                        <label class="label">Logo</label>
                        <input type="file" name="logo" accept="image/*" class="form-input" style="padding:0.5rem;">
                        <p class="text-xs text-gray-400 mt-1">Max 50KB</p>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn-primary" style="width:auto;padding:0.5rem 1.5rem;" id="createBtn" onclick="document.getElementById('createCompanyForm').requestSubmit()">
                    Create
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (!isLoggedIn()) { window.location.href = 'login.html'; }

        let companiesData = [];

        (async function() {
            const meResult = await apiCall('GET', '/auth/me');
            if (!meResult || meResult.status !== 200) {
                window.location.href = 'login.html';
                return;
            }

            const user = meResult.data;
            const isSuperAdmin = (user.companies || []).some(c => c.role === 'SUPER_ADMIN');
            if (!isSuperAdmin) {
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('loading').classList.add('hidden');
            await loadCompanies();
        })();

        async function loadCompanies() {
            const result = await apiCall('GET', '/companies');

            document.getElementById('loading').classList.add('hidden');

            if (!result || result.status !== 200) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            companiesData = result.data;

            if (companiesData.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('table-wrapper').classList.remove('hidden');
            const tbody = document.getElementById('companies-tbody');
            tbody.innerHTML = '';

            companiesData.forEach(c => {
                const tr = document.createElement('tr');
                const created = new Date(c.createdAt).toLocaleDateString();
                const statusClass = c.active ? 'badge-active' : 'badge-inactive';
                const statusText = c.active ? 'Active' : 'Inactive';
                tr.innerHTML =
                    '<td class="font-medium">' + c.name + '</td>' +
                    '<td>' + (c.city || '-') + '</td>' +
                    '<td>' + (c.state || '-') + '</td>' +
                    '<td>' + (c.country || '-') + '</td>' +
                    '<td>' + (c.contactNumber || '-') + '</td>' +
                    '<td><span class="badge ' + statusClass + '">' + statusText + '</span></td>' +
                    '<td>' + created + '</td>';
                tbody.appendChild(tr);
            });
        }

        function openCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
            document.getElementById('createCompanyForm').reset();
            document.getElementById('modal-global-error').classList.add('hidden');
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        async function handleCreateCompany(e) {
            e.preventDefault();
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            document.getElementById('modal-global-error').classList.add('hidden');

            const form = document.getElementById('createCompanyForm');
            const formData = new FormData(form);

            try {
                const headers = {};
                const token = getToken();
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const response = await fetch(API_BASE + '/companies', {
                    method: 'POST',
                    headers: headers,
                    body: formData,
                });

                const data = await response.json();

                btn.disabled = false;
                btn.textContent = 'Create';

                if (response.status === 201) {
                    closeCreateModal();
                    document.getElementById('loading').classList.remove('hidden');
                    document.getElementById('table-wrapper').classList.add('hidden');
                    document.getElementById('empty-state').classList.add('hidden');
                    await loadCompanies();
                } else if (response.status === 401) {
                    clearAuth();
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('modal-global-error').textContent = data.error || data.message || 'Failed to create company';
                    document.getElementById('modal-global-error').classList.remove('hidden');
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Create';
                document.getElementById('modal-global-error').textContent = 'Unable to connect to server.';
                document.getElementById('modal-global-error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
