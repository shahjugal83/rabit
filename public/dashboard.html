<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-900" id="welcome-msg">Dashboard</h2>
                <div class="flex items-center gap-3">
                    <span id="user-name" class="text-sm text-gray-600"></span>
                    <span id="user-initials" class="w-8 h-8 rounded-full text-white text-xs font-medium flex items-center justify-center" style="background-color:var(--carrot);"></span>
                </div>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading dashboard...</p>
            </div>

            <div id="dashboard" class="hidden">
                <div id="stats-cards" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <div class="detail-card">
                        <div class="detail-card-body">
                            <p class="info-box-label">Status</p>
                            <p id="user-status" class="info-box-value"></p>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-card-body">
                            <p class="info-box-label">Location</p>
                            <p id="user-location" class="info-box-value"></p>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-card-body">
                            <p class="info-box-label">Companies</p>
                            <p id="company-count" class="info-box-value text-2xl font-bold" style="color:var(--carrot);"></p>
                        </div>
                    </div>
                    <div id="admin-stats-card" class="hidden detail-card">
                        <div class="detail-card-body">
                            <p class="info-box-label">Total Users</p>
                            <p id="total-users" class="info-box-value text-2xl font-bold" style="color:var(--soft-blue);"></p>
                        </div>
                    </div>
                </div>

                <div id="admin-doc-stats" class="hidden mb-6">
                    <div class="detail-card">
                        <div class="detail-card-body">
                            <p class="info-box-label">Total Document Types</p>
                            <p id="total-doc-types" class="info-box-value text-2xl font-bold" style="color:var(--mint);"></p>
                        </div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-card-header">
                        <h3>Your Companies</h3>
                    </div>
                    <div class="detail-card-body">
                        <div id="companies-list" class="space-y-3"></div>
                        <p id="no-companies" class="hidden text-gray-400 text-sm">No companies yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script>
        (async function() {
            renderSidebar('dashboard');
            const user = await requireAuth();
            if (!user) return;

            const isSuperAdmin = (user.companies || []).some(c => c.role && c.role.name === 'SUPER_ADMIN');

            let features = {};
            if (isSuperAdmin && user.companies) {
                user.companies.forEach(c => {
                    if (c.features && c.features.userFeature) features.userFeature = true;
                    if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
                });
            }

            document.getElementById('user-name').textContent = user.firstName
                ? user.firstName + ' ' + (user.lastName || '')
                : user.username;

            const first = (user.firstName || user.username || '').charAt(0).toUpperCase();
            const last = (user.lastName || '').charAt(0).toUpperCase();
            document.getElementById('user-initials').textContent = first + last;

            document.getElementById('welcome-msg').textContent = 'Welcome, ' + (user.firstName || user.username) + '!';
            document.getElementById('user-status').textContent = user.status;

            const location = [user.city, user.state, user.country].filter(Boolean).join(', ');
            document.getElementById('user-location').textContent = location || 'Not set';

            const dashResult = await apiCall('GET', '/auth/dashboard');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            if (isSuperAdmin) {
                showAdminNavLinks(features);
                document.getElementById('stats-cards').classList.remove('hidden');
                document.getElementById('admin-stats-card').classList.remove('hidden');
                document.getElementById('admin-doc-stats').classList.remove('hidden');
            }

            const companies = (dashResult && dashResult.status === 200) ? (dashResult.data.companies || []) : [];
            document.getElementById('company-count').textContent = companies.length;

            if (isSuperAdmin && dashResult.data && dashResult.data.stats) {
                document.getElementById('total-users').textContent = dashResult.data.stats.users || 0;
                document.getElementById('total-doc-types').textContent = dashResult.data.stats.docTypes || 0;
            }

            if (companies.length === 0) {
                document.getElementById('no-companies').classList.remove('hidden');
            } else {
                const listEl = document.getElementById('companies-list');
                companies.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'info-box';
                    const members = c.memberCount !== undefined ? c.memberCount : '';
                    const docs = c.docTypeCount !== undefined ? c.docTypeCount : '';
                    const statsLine = isSuperAdmin
                        ? '<span class="text-xs text-gray-400 ml-2">(' + members + ' users, ' + docs + ' doc types)</span>'
                        : '';
                    div.innerHTML =
                        '<div class="flex items-center justify-between">' +
                            '<div>' +
                                '<p class="info-box-value">' + c.name + statsLine + '</p>' +
                                '<p class="text-sm text-gray-500">' + (c.userRole ? c.userRole.name : '') + '</p>' +
                            '</div>' +
                        '</div>';
                    listEl.appendChild(div);
                });
            }
        })();
    </script>
</body>
</html>
