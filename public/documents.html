<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="page-header">
                <h2 class="text-xl font-bold text-gray-900">Document Types</h2>
                <div class="flex gap-2" id="create-buttons">
                    <a href="document-bulk-create.html" class="btn-secondary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;" id="bulk-create-link">
                        + Bulk Create
                    </a>
                    <a href="document-create.html" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;" id="add-type-link">
                        + Add Type
                    </a>
                </div>
            </div>

            <div id="filter-section" class="mb-4" style="display:none;">
                <label class="label">Filter by Company</label>
                <select id="filter-company" class="form-input" style="max-width:20rem;" onchange="onFilterChange()">
                    <option value="">All companies</option>
                </select>
            </div>

            <div id="error-state" class="hidden text-center py-12">
                <p id="error-message" class="text-red-500"></p>
            </div>

            <div id="loading" class="text-center py-12 hidden">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading document types...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No document types yet</h3>
                <p class="text-gray-500 mb-6" id="empty-text">Select a company to view document types.</p>
                <a href="document-create.html" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;text-decoration:none;" id="empty-btn">
                    + Add Type
                </a>
            </div>

            <div id="rabbit-search" class="hidden"></div>
            <div id="rabbit-table" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script src="js/rabbit-actions.js"></script>
    <script>
        let companiesData = [];
        let allDocTypes = [];

        (async function() {
            renderSidebar('documents');
            const user = await requireAuth();
            if (!user) return;

            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.userFeature) features.userFeature = true;
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });

            showAdminNavLinks(features);

            if (!hasPermission('documents', 'create')) {
                document.getElementById('create-buttons').style.display = 'none';
            }

            if (isSuperAdmin()) {
                document.getElementById('filter-section').style.display = '';
            }

            const companyResult = await apiCall('GET', '/companies');
            if (companyResult && companyResult.status === 200) {
                companiesData = companyResult.data || [];
                const select = document.getElementById('filter-company');
                companiesData.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.companyId;
                    opt.textContent = c.name;
                    select.appendChild(opt);
                });

                var savedFilter = localStorage.getItem('documents_filter');
                if (savedFilter && companiesData.some(function(c) { return c.companyId === savedFilter; })) {
                    select.value = savedFilter;
                }

                document.getElementById('loading').classList.remove('hidden');
                loadDocumentTypes();
            }

            if (companiesData.length === 0) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('empty-text').textContent = 'No companies available.';
                document.getElementById('empty-btn').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            }
        })();

        function onFilterChange() {
            var companyId = document.getElementById('filter-company').value;
            localStorage.setItem('documents_filter', companyId);
            loadDocumentTypes();
        }

        async function loadDocumentTypes() {
            var companyId = document.getElementById('filter-company').value;

            var createLink = document.getElementById('add-type-link');
            var bulkLink = document.getElementById('bulk-create-link');
            if (companyId) {
                createLink.href = 'document-create.html?companyId=' + companyId;
                bulkLink.href = 'document-bulk-create.html?companyId=' + companyId;
            } else {
                createLink.href = 'document-create.html';
                bulkLink.href = 'document-bulk-create.html';
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.add('hidden');
            document.getElementById('rabbit-search').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');

            allDocTypes = [];

            var companiesToQuery = companyId
                ? companiesData.filter(function(c) { return c.companyId === companyId; })
                : companiesData;

            for (const company of companiesToQuery) {
                setCompanyId(company.companyId);
                var result = await apiCall('GET', '/companies/' + company.companyId + '/document-types');
                setCompanyId(null);

                if (result && result.status === 200) {
                    var docs = (result.data || []).map(function(d) { return Object.assign({}, d, { companyName: company.name, companyId: company.companyId }); });
                    allDocTypes = allDocTypes.concat(docs);
                }
            }

            document.getElementById('loading').classList.add('hidden');

            if (allDocTypes.length === 0) {
                document.getElementById('empty-text').textContent = companyId ? 'No document types for this company.' : 'No document types yet.';
                document.getElementById('empty-btn').classList.remove('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('rabbit-search').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.remove('hidden');

            RabbitSearch.render({
                containerId: 'rabbit-search',
                placeholder: 'Search document types...',
                sortFields: [
                    { key: 'name', label: 'Name' },
                    { key: 'companyName', label: 'Company' },
                    { key: 'createdAt', label: 'Date' }
                ],
                onSearch: function(query) {
                    RabbitTable.search('rabbit-table', query);
                },
                onSort: function(field, order) {
                    allDocTypes.sort(function(a, b) {
                        var va = a[field] || '';
                        var vb = b[field] || '';
                        if (field === 'createdAt') {
                            va = new Date(va).getTime();
                            vb = new Date(vb).getTime();
                            return order === 'asc' ? va - vb : vb - va;
                        }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                    renderDocTable();
                }
            });

            renderDocTable();
        }

        function renderDocTable() {
            RabbitTable.render({
                containerId: 'rabbit-table',
                type: 'documents',
                columns: [
                    { key: 'name', label: 'Name', sortable: true },
                    { key: 'documentNumber', label: 'Doc Number', sortable: false, render: function(row) { return row.documentNumber || '-'; } },
                    { key: 'companyName', label: 'Company', sortable: true },
                    { key: 'createdBy', label: 'Created By', sortable: false },
                    { key: 'createdAt', label: 'Created', sortable: true, render: function(row) {
                        return new Date(row.createdAt).toLocaleDateString();
                    }}
                ],
                data: allDocTypes.map(function(d) {
                    return {
                        id: d.documentTypeId,
                        name: d.name,
                        documentNumber: d.documentNumber,
                        companyName: d.companyName,
                        companyId: d.companyId,
                        createdBy: d.creator ? d.creator.username : '-',
                        createdAt: d.createdAt
                    };
                }),
                selected: [],
                onRefresh: function() { loadDocumentTypes(); },
                actions: function(row) {
                    return RabbitActions.renderActions('documents', row, { deleteFunction: 'handleDelete(\'' + row.id + '\',\'' + row.companyId + '\')' });
                },
                searchFields: ['name', 'documentNumber', 'companyName']
            });
        }

        async function handleDelete(documentTypeId, companyId) {
            if (!confirm('Are you sure you want to delete this document type?')) return;

            setCompanyId(companyId);
            var result = await apiCall('DELETE', '/companies/' + companyId + '/document-types/' + documentTypeId);
            setCompanyId(null);

            if (result && (result.status === 200 || result.status === 204)) {
                await loadDocumentTypes();
            } else if (result && result.status === 401) {
                clearAuth();
                window.location.href = 'login.html';
            } else {
                alert((result && result.data && (result.data.error || result.data.message)) || 'Failed to delete document type');
            }
        }
    </script>
</body>
</html>
