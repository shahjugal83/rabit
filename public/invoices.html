<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="page-header">
                <h2 class="text-xl font-bold text-gray-900">Invoices</h2>
                <a href="invoice-create.html" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;" id="create-btn">
                    + Create Invoice
                </a>
            </div>

            <div id="filter-section" class="mb-4" style="display:none;">
                <label class="label">Filter by Company</label>
                <select id="filter-company" class="form-input" style="max-width:20rem;" onchange="onFilterChange()">
                    <option value="">All companies</option>
                </select>
            </div>

            <div id="error-state" class="hidden text-center py-12">
                <p id="error-message" class="text-red-500"></p>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading invoices...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No invoices yet</h3>
                <p class="text-gray-500 mb-6">Create your first invoice to get started.</p>
                <a href="invoice-create.html" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;text-decoration:none;">
                    + Create Invoice
                </a>
            </div>

            <div id="rabbit-search" class="hidden"></div>
            <div id="rabbit-table" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script src="js/rabbit-actions.js"></script>
    <script>
        let companiesData = [];
        let allInvoices = [];

        (async function() {
            renderSidebar('invoices');
            const user = await requireAuth();
            if (!user) return;

            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });

            if (!features.invoiceManagement) {
                window.location.href = 'dashboard.html';
                return;
            }

            showAdminNavLinks(features);

            if (!hasPermission('invoices', 'create')) {
                document.getElementById('create-btn').classList.add('hidden');
            }

            if (isSuperAdmin()) {
                document.getElementById('filter-section').style.display = '';
            }

            const companyResult = await apiCall('GET', '/companies');
            if (companyResult && companyResult.status === 200) {
                companiesData = companyResult.data || [];
                const filterSelect = document.getElementById('filter-company');
                companiesData.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.companyId;
                    opt.textContent = c.name;
                    filterSelect.appendChild(opt);
                });

                var savedFilter = localStorage.getItem('invoices_filter');
                if (savedFilter && companiesData.some(c => c.companyId === savedFilter)) {
                    filterSelect.value = savedFilter;
                }
            }

            document.getElementById('loading').classList.add('hidden');
            await loadInvoices();
        })();

        function onFilterChange() {
            var companyId = document.getElementById('filter-company').value;
            var createBtn = document.getElementById('create-btn');
            if (companyId) {
                createBtn.href = 'invoice-create.html?companyId=' + companyId;
            } else {
                createBtn.href = 'invoice-create.html';
            }
            localStorage.setItem('invoices_filter', companyId);
            loadInvoices();
        }

        async function loadInvoices() {
            var filterCompanyId = document.getElementById('filter-company').value;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.add('hidden');
            document.getElementById('rabbit-search').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');

            var endpoint = filterCompanyId ? '/invoices?company=' + encodeURIComponent(companiesData.find(function(c) { return c.companyId === filterCompanyId; }).name) : '/invoices';
            var result = await apiCall('GET', endpoint);
            document.getElementById('loading').classList.add('hidden');

            if (!result || result.status === 0) {
                document.getElementById('error-message').textContent = 'Unable to connect to server';
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            if (result.status === 403) {
                document.getElementById('error-message').textContent = 'Access denied — invoice management not enabled';
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            if (result.status !== 200) {
                document.getElementById('error-message').textContent = 'Server error — please try again';
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            allInvoices = result.data || [];

            if (allInvoices.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('rabbit-search').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.remove('hidden');

            RabbitSearch.render({
                containerId: 'rabbit-search',
                placeholder: 'Search invoices...',
                sortFields: [
                    { key: 'documentNumber', label: 'Doc Number' },
                    { key: 'documentName', label: 'Doc Name' },
                    { key: 'companyName', label: 'Company' },
                    { key: 'createdAt', label: 'Date' }
                ],
                onSearch: function(query) {
                    RabbitTable.search('rabbit-table', query);
                },
                onSort: function(field, order) {
                    allInvoices.sort(function(a, b) {
                        var va = a[field] || '';
                        var vb = b[field] || '';
                        if (field === 'createdAt') {
                            va = new Date(va).getTime();
                            vb = new Date(vb).getTime();
                            return order === 'asc' ? va - vb : vb - va;
                        }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                    renderInvoiceTable();
                }
            });

            renderInvoiceTable();
        }

        function renderInvoiceTable() {
            RabbitTable.render({
                containerId: 'rabbit-table',
                type: 'invoices',
                columns: [
                    { key: 'invoiceId', label: 'ID', sortable: true },
                    { key: 'documentNumber', label: 'Doc Number', sortable: true },
                    { key: 'documentName', label: 'Doc Name', sortable: true },
                    { key: 'companyName', label: 'Company', sortable: true },
                    { key: 'materials', label: 'Materials', sortable: false, render: function(row) {
                        return (row.items || []).map(function(i) {
                            return '<div class="text-sm"><span class="font-medium">' + i.materialName + '</span> <span class="text-gray-400">/</span> ' + i.identifierName + '</div>';
                        }).join('');
                    }},
                    { key: 'createdAt', label: 'Created', sortable: true, render: function(row) {
                        return new Date(row.createdAt).toLocaleDateString();
                    }}
                ],
                data: allInvoices.map(function(inv) {
                    return {
                        id: inv.invoiceId,
                        invoiceId: inv.invoiceId,
                        documentNumber: inv.documentNumber,
                        documentName: inv.documentName,
                        companyName: inv.companyName,
                        materials: (inv.items || []).map(function(i) { return i.materialName + ' ' + i.identifierName; }).join(' '),
                        items: inv.items,
                        createdAt: inv.createdAt
                    };
                }),
                selected: [],
                onRefresh: function() { loadInvoices(); },
                actions: function(row) {
                    return RabbitActions.renderActions('invoices', row, { deleteFunction: 'handleDelete(' + row.id + ')' });
                },
                searchFields: ['documentNumber', 'documentName', 'companyName', 'materials']
            });
        }

        async function handleDelete(invoiceId) {
            if (!confirm('Are you sure you want to delete this invoice?')) return;

            const result = await apiCall('DELETE', '/invoices/' + invoiceId);

            if (result && (result.status === 200 || result.status === 204)) {
                await loadInvoices();
            } else if (result && result.status === 401) {
                clearAuth();
                window.location.href = 'login.html';
            } else {
                alert((result && result.data && (result.data.error || result.data.message)) || 'Failed to delete invoice');
            }
        }
    </script>
</body>
</html>
