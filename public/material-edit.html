<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Material - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="page-header">
                <a href="materials.html" class="back-link">&larr; Back to Materials</a>
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-gray-900">Edit Material</h2>
                </div>
            </div>
            <div class="form-card">
                <div id="form-error" class="hidden global-error"></div>
                <form id="material-form" class="space-y-4">
                    <div>
                        <label for="material-name" class="label">Material Name *</label>
                        <input type="text" id="material-name" name="material-name" required
                            class="form-input"
                            placeholder="e.g. Cement, Steel Rod">
                    </div>
                    <div>
                        <label class="label">Companies *</label>
                        <div id="companies-checkboxes" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto border rounded p-2">
                            <span class="text-gray-400 text-sm">Loading companies...</span>
                        </div>
                    </div>
                    <div>
                        <label class="label">Identifiers</label>
                        <div class="flex gap-2">
                            <select id="identifier-select" class="form-input" style="flex:1;">
                                <option value="KG">KG</option>
                                <option value="G">G</option>
                                <option value="Ltr">Ltr</option>
                                <option value="Unit">Unit</option>
                                <option value="Mt">Mt</option>
                                <option value="Bag">Bag</option>
                                <option value="Pcs">Pcs</option>
                                <option value="Box">Box</option>
                                <option value="Roll">Roll</option>
                                <option value="Set">Set</option>
                            </select>
                            <button type="button" onclick="addIdentifier()" class="btn-secondary">Add</button>
                        </div>
                        <div id="identifiers-list" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                    <div class="form-actions">
                        <a href="materials.html" class="btn-secondary">Cancel</a>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script>
        (async function() {
            const user = await requireAuth();
            if (!user) return;
            if (!hasFeature('invoiceManagement')) { window.location.href = 'materials.html'; return; }
            renderSidebar('materials');
        })();

        const params = new URLSearchParams(window.location.search);
        const materialId = params.get('materialId');
        if (!materialId) {
            window.location.href = 'materials.html';
        }

        let companies = [];
        let allMaterials = [];
        let selectedIdentifiers = [];
        let material = null;

        async function loadData() {
            try {
                const [companiesRes, materialsRes] = await Promise.all([
                    apiGet('/companies'),
                    apiGet('/materials')
                ]);
                companies = (companiesRes && companiesRes.status === 200) ? (companiesRes.data || []) : [];
                allMaterials = (materialsRes && materialsRes.status === 200) ? (materialsRes.data || []) : [];
                material = allMaterials.find(m => m.materialId === materialId);
                if (!material) {
                    document.getElementById('form-error').textContent = 'Material not found';
                    document.getElementById('form-error').classList.remove('hidden');
                    return;
                }
                renderCompanyCheckboxes();
                prefillForm();
            } catch (err) {
                document.getElementById('form-error').textContent = err.message || 'Failed to load data';
                document.getElementById('form-error').classList.remove('hidden');
            }
        }

        function renderCompanyCheckboxes() {
            const container = document.getElementById('companies-checkboxes');
            if (companies.length === 0) {
                container.innerHTML = '<span class="text-gray-400 text-sm">No companies found</span>';
                return;
            }
            const checkedIds = material.companyIds || [];
            container.innerHTML = companies.map(c =>
                '<label class="flex items-center gap-2 text-sm">' +
                '<input type="checkbox" name="company" value="' + c.companyId + '"' +
                    (checkedIds.includes(c.companyId) ? ' checked' : '') +
                    ' class="rounded border-gray-300 text-blue-600">' +
                escapeHtml(c.name) +
                '</label>'
            ).join('');
        }

        function prefillForm() {
            document.getElementById('material-name').value = material.name || '';
            selectedIdentifiers = [...(material.identifiers || [])];
            renderIdentifiersList();
        }

        function addIdentifier() {
            const select = document.getElementById('identifier-select');
            const name = select.value;
            if (name && !selectedIdentifiers.includes(name)) {
                selectedIdentifiers.push(name);
                renderIdentifiersList();
            }
        }

        function removeIdentifier(name) {
            selectedIdentifiers = selectedIdentifiers.filter(i => i !== name);
            renderIdentifiersList();
        }

        function renderIdentifiersList() {
            const container = document.getElementById('identifiers-list');
            container.innerHTML = selectedIdentifiers.map(name =>
                `<span class="inline-flex items-center gap-1 bg-blue-100 text-blue-800 text-sm px-3 py-1 rounded-full">
                    ${escapeHtml(name)}
                    <button type="button" onclick="removeIdentifier('${name}')" class="text-blue-600 hover:text-blue-900 font-bold">&times;</button>
                </span>`
            ).join('');
        }

        document.getElementById('material-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorEl = document.getElementById('form-error');
            errorEl.classList.add('hidden');

            const name = document.getElementById('material-name').value.trim();
            const companyIds = Array.from(document.querySelectorAll('input[name="company"]:checked')).map(cb => cb.value);

            if (!name) {
                errorEl.textContent = 'Material name is required';
                errorEl.classList.remove('hidden');
                return;
            }
            if (companyIds.length === 0) {
                errorEl.textContent = 'Please select at least one company';
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                await apiPut(`/materials/${materialId}`, { name, companyIds, identifiers: selectedIdentifiers });
                window.location.href = 'materials.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Failed to update material';
                errorEl.classList.remove('hidden');
            }
        });

        loadData();
    </script>
</body>
</html>
