<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="page-header">
                <h2 class="text-xl font-bold text-gray-900">Materials</h2>
                <a href="material-create.html" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;" id="create-btn">
                    + Add Material
                </a>
            </div>

            <div id="filter-section" class="mb-4">
                <label class="label">Filter by Company</label>
                <select id="filter-company" class="form-input" style="max-width:20rem;" onchange="onFilterChange()">
                    <option value="">All companies</option>
                </select>
            </div>

            <div id="error-state" class="hidden text-center py-12">
                <p id="error-message" class="text-red-500"></p>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading materials...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No materials yet</h3>
                <p class="text-gray-500 mb-6">Add a material to get started.</p>
                <a href="material-create.html" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;text-decoration:none;">
                    + Add Material
                </a>
            </div>

            <div id="rabbit-search" class="hidden"></div>
            <div id="rabbit-table" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script src="js/rabbit-actions.js"></script>
    <script>
        let companiesData = [];
        let allMaterials = [];

        (async function() {
            renderSidebar('materials');
            const user = await requireAuth();
            if (!user) return;

            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });

            if (!features.invoiceManagement) {
                window.location.href = 'dashboard.html';
                return;
            }

            showAdminNavLinks(features);

            if (!hasPermission('materials', 'create')) {
                document.getElementById('create-btn').classList.add('hidden');
            }

            if (!isSuperAdmin()) {
                document.getElementById('filter-section').classList.add('hidden');
            }

            const companyResult = await apiCall('GET', '/companies');
            if (companyResult && companyResult.status === 200) {
                companiesData = companyResult.data || [];
                const select = document.getElementById('filter-company');
                companiesData.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.companyId;
                    opt.textContent = c.name;
                    select.appendChild(opt);
                });
            }

            document.getElementById('loading').classList.add('hidden');
            await loadMaterials();
        })();

        function onFilterChange() {
            var companyId = document.getElementById('filter-company').value;
            var createBtn = document.getElementById('create-btn');
            if (companyId) {
                createBtn.href = 'material-create.html?companyId=' + companyId;
            } else {
                createBtn.href = 'material-create.html';
            }
            localStorage.setItem('materials_filter', companyId);
            loadMaterials();
        }

        async function loadMaterials() {
            const filterCompanyId = document.getElementById('filter-company').value;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.add('hidden');
            document.getElementById('rabbit-search').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');

            const result = await apiCall('GET', '/materials');
            document.getElementById('loading').classList.add('hidden');

            if (!result || result.status === 0) {
                document.getElementById('error-message').textContent = 'Unable to connect to server';
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            if (result.status === 403) {
                document.getElementById('error-message').textContent = 'Access denied — invoice management not enabled';
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            if (result.status !== 200) {
                document.getElementById('error-message').textContent = 'Server error — please try again';
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            allMaterials = result.data || [];

            if (filterCompanyId) {
                allMaterials = allMaterials.filter(m =>
                    m.companies.some(c => c.companyId === filterCompanyId)
                );
            }

            if (allMaterials.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('rabbit-search').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.remove('hidden');

            RabbitSearch.render({
                containerId: 'rabbit-search',
                placeholder: 'Search materials...',
                sortFields: [
                    { key: 'name', label: 'Name' }
                ],
                onSearch: function(query) {
                    RabbitTable.search('rabbit-table', query);
                },
                onSort: function(field, order) {
                    allMaterials.sort(function(a, b) {
                        var va = a[field] || '';
                        var vb = b[field] || '';
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                    renderMaterialTable();
                }
            });

            renderMaterialTable();
        }

        function renderMaterialTable() {
            RabbitTable.render({
                containerId: 'rabbit-table',
                type: 'materials',
                columns: [
                    { key: 'name', label: 'Material Name', sortable: true },
                    { key: 'companies', label: 'Companies', sortable: false, render: function(row) {
                        return row.companies.map(function(c) { return c.name; }).join(', ') || '-';
                    }},
                    { key: 'identifiers', label: 'Identifiers', sortable: false, render: function(row) {
                        return row.identifiers.map(function(i) { return i.name; }).join(', ') || '-';
                    }}
                ],
                data: allMaterials.map(function(m) {
                    return {
                        id: m.materialId,
                        name: m.name,
                        companies: m.companies,
                        identifiers: m.identifiers
                    };
                }),
                selected: [],
                onRefresh: function() { loadMaterials(); },
                actions: function(row) {
                    return RabbitActions.renderActions('materials', row, { deleteFunction: 'handleDelete(\'' + row.id + '\')' });
                },
                searchFields: ['name']
            });
        }

        async function handleDelete(materialId) {
            if (!confirm('Are you sure you want to delete this material?')) return;

            const result = await apiCall('DELETE', '/materials/' + materialId);

            if (result && (result.status === 200 || result.status === 204)) {
                await loadMaterials();
            } else if (result && result.status === 401) {
                clearAuth();
                window.location.href = 'login.html';
            } else {
                alert((result && result.data && (result.data.error || result.data.message)) || 'Failed to delete material');
            }
        }
    </script>
</body>
</html>
