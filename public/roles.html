<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="page-header">
                <h2 class="text-xl font-bold text-gray-900">Roles</h2>
                <a href="role-create.html" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;" id="create-btn">
                    + Create Role
                </a>
            </div>

            <div id="error-state" class="hidden text-center py-12">
                <p id="error-message" class="text-red-500"></p>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading roles...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No roles yet</h3>
                <p class="text-gray-500 mb-6">Create your first role to get started.</p>
                <a href="role-create.html" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;text-decoration:none;">
                    + Create Role
                </a>
            </div>

            <div id="rabbit-search" class="hidden"></div>
            <div id="rabbit-table" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script src="js/rabbit-actions.js"></script>
    <script>
        let rolesData = [];
        let companiesData = [];

        (async function() {
            renderSidebar('roles');
            const user = await requireAuth();
            if (!user) return;

            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.userFeature) features.userFeature = true;
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });

            if (!features.userFeature) {
                window.location.href = 'dashboard.html';
                return;
            }

            showAdminNavLinks(features);

            if (!hasPermission('roles', 'create')) {
                document.getElementById('create-btn').classList.add('hidden');
            }

            const companyResult = await apiCall('GET', '/companies');
            if (companyResult && companyResult.status === 200) {
                companiesData = companyResult.data;
            }

            document.getElementById('loading').classList.add('hidden');
            await loadRoles();
        })();

        async function loadRoles() {
            var companyId = companiesData.length > 0 ? companiesData[0].companyId : null;
            if (companyId) setCompanyId(companyId);
            var result = await apiCall('GET', '/roles');
            setCompanyId(null);
            document.getElementById('loading').classList.add('hidden');

            if (!result || result.status !== 200) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            rolesData = result.data;

            if (rolesData.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('rabbit-search').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.remove('hidden');

            RabbitSearch.render({
                containerId: 'rabbit-search',
                placeholder: 'Search roles...',
                sortFields: [
                    { key: 'name', label: 'Name' },
                    { key: 'companyName', label: 'Company' }
                ],
                onSearch: function(query) {
                    RabbitTable.search('rabbit-table', query);
                },
                onSort: function(field, order) {
                    rolesData.sort(function(a, b) {
                        var va = '', vb = '';
                        if (field === 'name') { va = a.name || ''; vb = b.name || ''; }
                        else if (field === 'companyName') { va = a.company ? a.company.name : ''; vb = b.company ? b.company.name : ''; }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                    renderRoleTable();
                }
            });

            renderRoleTable();
        }

        function renderRoleTable() {
            RabbitTable.render({
                containerId: 'rabbit-table',
                type: 'roles',
                columns: [
                    { key: 'name', label: 'Role Name', sortable: true },
                    { key: 'companyName', label: 'Company', sortable: true },
                    { key: 'isSystem', label: 'Type', sortable: false, render: function(row) {
                        return row.isSystem ? '<span class="badge badge-active">System</span>' : '<span class="badge badge-inactive">Custom</span>';
                    }},
                    { key: 'createdBy', label: 'Created By', sortable: false },
                    { key: 'permCount', label: 'Permissions', sortable: false, render: function(row) {
                        return row.permCount + ' permission' + (row.permCount !== 1 ? 's' : '');
                    }}
                ],
                data: rolesData.map(function(r) {
                    return {
                        id: r.roleId,
                        name: r.name,
                        companyName: r.company ? r.company.name : '-',
                        isSystem: r.isSystem,
                        createdBy: r.creator ? r.creator.username : '-',
                        permCount: r.permissions ? r.permissions.length : 0,
                        _raw: r
                    };
                }),
                selected: [],
                onRefresh: function() { loadRoles(); },
                actions: function(row) {
                    if (row.isSystem) {
                        return '<span class="text-gray-400 text-sm">System Role</span>';
                    }
                    return RabbitActions.renderActions('roles', row, { deleteFunction: 'handleDelete(\'' + row.id + '\')' });
                },
                searchFields: ['name', 'companyName']
            });
        }

        async function handleDelete(roleId) {
            if (!confirm('Are you sure you want to delete this role?')) return;

            var role = rolesData.find(function(r) { return r.roleId === roleId; });
            if (role && role.companyId) setCompanyId(role.companyId);
            var result = await apiCall('DELETE', '/roles/' + roleId);
            setCompanyId(null);

            if (result && (result.status === 200 || result.status === 204)) {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('rabbit-table').classList.add('hidden');
                document.getElementById('rabbit-search').classList.add('hidden');
                document.getElementById('empty-state').classList.add('hidden');
                await loadRoles();
            } else if (result && result.status === 401) {
                clearAuth();
                window.location.href = 'login.html';
            } else {
                alert((result && result.data && (result.data.error || result.data.message)) || 'Failed to delete role');
            }
        }
    </script>
</body>
</html>
