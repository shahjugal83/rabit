<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Role - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div class="page-header">
                <a href="users.html" class="back-link">&larr; Back to Users</a>
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-gray-900">Change Role</h2>
                </div>
            </div>
            <div class="form-card">
                <div id="form-error" class="hidden global-error"></div>
                <div id="loading" class="text-center py-8">
                    <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                    <p class="text-gray-500">Loading...</p>
                </div>
                <form id="roleForm" onsubmit="handleSubmit(event)" class="hidden">
                    <div class="mb-4">
                        <label class="label">New Role *</label>
                        <select id="change-role-select" class="form-input" required>
                            <option value="">Select role...</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <a href="users.html" class="btn-secondary">Cancel</a>
                        <button type="submit" class="btn-primary" style="width:auto;padding:0.5rem 1.5rem;" id="submitBtn">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('userId');
        const companyId = params.get('companyId');

        if (!userId || !companyId) { window.location.href = 'users.html'; }

        (async function() {
            renderSidebar('users');
            const user = await requireAuth();
            if (!user) return;
            const isSuperAdmin = (user.companies || []).some(c => c.role && c.role.name === 'SUPER_ADMIN');
            if (!isSuperAdmin) { window.location.href = 'dashboard.html'; return; }
            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.userFeature) features.userFeature = true;
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });
            if (!features.userFeature) { window.location.href = 'dashboard.html'; return; }
            showAdminNavLinks(features);

            setCompanyId(companyId);
            const [rolesResult, usersResult] = await Promise.all([
                apiCall('GET', '/roles'),
                apiCall('GET', '/companies/' + companyId + '/users')
            ]);
            setCompanyId(null);

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('roleForm').classList.remove('hidden');

            const select = document.getElementById('change-role-select');
            select.innerHTML = '<option value="">Select role...</option>';
            if (rolesResult && rolesResult.status === 200) {
                (rolesResult.data || []).forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.roleId;
                    opt.textContent = r.name;
                    select.appendChild(opt);
                });
            }

            if (usersResult && usersResult.status === 200) {
                const currentUser = (usersResult.data || []).find(u => u.userId === userId);
                if (currentUser && currentUser.role) {
                    select.value = currentUser.role.roleId;
                }
            }
        })();

        async function handleSubmit(e) {
            e.preventDefault();
            const roleId = document.getElementById('change-role-select').value;
            if (!roleId) {
                document.getElementById('form-error').textContent = 'Please select a role';
                document.getElementById('form-error').classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            document.getElementById('form-error').classList.add('hidden');

            try {
                setCompanyId(companyId);
                const result = await apiCall('PUT', '/companies/' + companyId + '/users/' + userId + '/role', { roleId });
                setCompanyId(null);
                btn.disabled = false;
                btn.textContent = 'Save';
                if (result && result.status === 200) {
                    window.location.href = 'users.html';
                } else if (result && result.status === 401) {
                    clearAuth(); window.location.href = 'login.html';
                } else {
                    document.getElementById('form-error').textContent = (result && result.data && (result.data.error || result.data.message)) || 'Failed to change role';
                    document.getElementById('form-error').classList.remove('hidden');
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Save';
                document.getElementById('form-error').textContent = 'Unable to connect to server.';
                document.getElementById('form-error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
