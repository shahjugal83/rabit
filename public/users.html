<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Rabbit Invoice</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <div class="layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div class="page-header">
                <h2 class="text-xl font-bold text-gray-900">Users</h2>
                <a href="user-create.html" class="btn-primary" style="width:auto;padding:0.5rem 1.25rem;text-decoration:none;" id="create-btn">
                    + Add User
                </a>
            </div>

            <div id="filter-section" class="mb-4" style="display:none;">
                <label class="label">Filter by Company</label>
                <select id="filter-company" class="form-input" style="max-width:20rem;" onchange="onFilterChange()">
                    <option value="">All companies</option>
                </select>
            </div>

            <div id="error-state" class="hidden text-center py-12">
                <p id="error-message" class="text-red-500"></p>
            </div>

            <div id="loading" class="text-center py-12">
                <div class="spinner mx-auto mb-4" style="width:2rem;height:2rem;border-width:3px;border-color:var(--carrot);border-right-color:transparent;"></div>
                <p class="text-gray-500">Loading users...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-16">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <h3 class="text-lg font-semibold text-gray-700 mb-2">No users found</h3>
                <p class="text-gray-500 mb-6">Add a user to get started.</p>
                <a href="user-create.html" class="btn-primary" style="width:auto;padding:0.625rem 2rem;display:inline-block;text-decoration:none;">
                    + Add User
                </a>
            </div>

            <div id="rabbit-search" class="hidden"></div>
            <div id="rabbit-table" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/rabbit-table.js"></script>
    <script src="js/rabbit-search.js"></script>
    <script src="js/rabbit-card.js"></script>
    <script src="js/rabbit-actions.js"></script>
    <script>
        let companiesData = [];
        let allUsers = [];
        let currentUserId = localStorage.getItem('userId');

        (async function() {
            renderSidebar('users');
            const user = await requireAuth();
            if (!user) return;

            let features = {};
            (user.companies || []).forEach(c => {
                if (c.features && c.features.userFeature) features.userFeature = true;
                if (c.features && c.features.invoiceManagement) features.invoiceManagement = true;
            });

            if (!features.userFeature) {
                window.location.href = 'dashboard.html';
                return;
            }

            showAdminNavLinks(features);

            if (!hasPermission('users', 'create')) {
                document.getElementById('create-btn').classList.add('hidden');
            }

            if (isSuperAdmin()) {
                document.getElementById('filter-section').style.display = '';
            }

            const companyResult = await apiCall('GET', '/companies');
            if (companyResult && companyResult.status === 200) {
                companiesData = companyResult.data;
                const select = document.getElementById('filter-company');
                companiesData.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.companyId;
                    opt.textContent = c.name;
                    select.appendChild(opt);
                });

                var savedFilter = localStorage.getItem('users_filter');
                if (savedFilter && companiesData.some(function(c) { return c.companyId === savedFilter; })) {
                    select.value = savedFilter;
                }
            }

            document.getElementById('loading').classList.add('hidden');
            await loadUsers();
        })();

        function onFilterChange() {
            var companyId = document.getElementById('filter-company').value;
            var createBtn = document.getElementById('create-btn');
            if (companyId) {
                createBtn.href = 'user-create.html?companyId=' + companyId;
            } else {
                createBtn.href = 'user-create.html';
            }
            localStorage.setItem('users_filter', companyId);
            loadUsers();
        }

        async function loadUsers() {
            var filterCompanyId = document.getElementById('filter-company').value;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.add('hidden');
            document.getElementById('rabbit-search').classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');

            allUsers = [];
            var companiesToQuery = filterCompanyId
                ? companiesData.filter(function(c) { return c.companyId === filterCompanyId; })
                : companiesData;

            for (const company of companiesToQuery) {
                setCompanyId(company.companyId);
                var result = await apiCall('GET', '/companies/' + company.companyId + '/users');
                if (result && result.status === 200) {
                    var users = (result.data || []).map(function(u) {
                        return Object.assign({}, u, { companyName: company.name, companyId: company.companyId });
                    });
                    allUsers = allUsers.concat(users);
                }
            }
            setCompanyId(null);

            document.getElementById('loading').classList.add('hidden');

            if (allUsers.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('rabbit-search').classList.remove('hidden');
            document.getElementById('rabbit-table').classList.remove('hidden');

            RabbitSearch.render({
                containerId: 'rabbit-search',
                placeholder: 'Search users...',
                sortFields: [
                    { key: 'username', label: 'Username' },
                    { key: 'email', label: 'Email' },
                    { key: 'companyName', label: 'Company' }
                ],
                onSearch: function(query) {
                    RabbitTable.search('rabbit-table', query);
                },
                onSort: function(field, order) {
                    allUsers.sort(function(a, b) {
                        var va = '', vb = '';
                        if (field === 'username') { va = a.user.username || ''; vb = b.user.username || ''; }
                        else if (field === 'email') { va = a.user.email || ''; vb = b.user.email || ''; }
                        else if (field === 'companyName') { va = a.companyName || ''; vb = b.companyName || ''; }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return order === 'asc' ? -1 : 1;
                        if (va > vb) return order === 'asc' ? 1 : -1;
                        return 0;
                    });
                    renderUserTable();
                }
            });

            renderUserTable();
        }

        function renderUserTable() {
            const currentUserId = localStorage.getItem('userId');

            RabbitTable.render({
                containerId: 'rabbit-table',
                type: 'users',
                columns: [
                    { key: 'username', label: 'Username', sortable: true },
                    { key: 'email', label: 'Email', sortable: true },
                    { key: 'name', label: 'Name', sortable: false },
                    { key: 'companyName', label: 'Company', sortable: true },
                    { key: 'roleName', label: 'Role', sortable: false },
                    { key: 'status', label: 'Status', sortable: false, render: function(row) {
                        var cls = row.status === 'ACTIVE' ? 'badge-active' : 'badge-inactive';
                        return '<span class="badge ' + cls + '">' + (row.status || '-') + '</span>';
                    }}
                ],
                data: allUsers.map(function(u) {
                    return {
                        id: u.userId,
                        username: u.user.username,
                        email: u.user.email,
                        name: [u.user.firstName, u.user.lastName].filter(Boolean).join(' '),
                        companyName: u.companyName,
                        roleName: u.role ? u.role.name : '-',
                        status: u.user.status,
                        companyId: u.companyId,
                        _raw: u
                    };
                }),
                selected: [],
                onRefresh: function() { loadUsers(); },
                actions: function(row) {
                    if (row.id === currentUserId) {
                        return '<button class="btn-secondary btn-sm" disabled>Role</button> <button class="btn-secondary btn-sm" style="color:#9ca3af;" disabled>Remove</button>';
                    }
                    return '<a href="user-role-edit.html?userId=' + row.id + '&companyId=' + row.companyId + '" class="btn-secondary btn-sm">Role</a> ' +
                           '<button class="btn-secondary btn-sm" style="color:#dc2626;" onclick="handleRemove(\'' + row.companyId + '\',\'' + row.id + '\')">Remove</button>';
                },
                searchFields: ['username', 'email', 'name', 'companyName', 'roleName', 'status']
            });
        }

        async function handleRemove(companyId, userId) {
            if (!confirm('Are you sure you want to remove this user from the company?')) return;

            setCompanyId(companyId);
            const result = await apiCall('DELETE', '/companies/' + companyId + '/users/' + userId);
            setCompanyId(null);

            if (result && (result.status === 200 || result.status === 204)) {
                await loadUsers();
            } else if (result && result.status === 401) {
                clearAuth();
                window.location.href = 'login.html';
            } else {
                alert((result && result.data && (result.data.error || result.data.message)) || 'Failed to remove user');
            }
        }
    </script>
</body>
</html>
