spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.HSQLDialect
        format_sql: false
    show-sql: false
  datasource:
    url: jdbc:hsqldb:file:/data/saas_db;shutdown=true
    username: sa
    password:
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production}
    expiration: ${JWT_EXPIRATION:86400000}
    verification-expiration: ${JWT_VERIFICATION_EXPIRATION:3600000}
  company:
    base-domain: ${COMPANY_BASE_DOMAIN:invoice.com}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
