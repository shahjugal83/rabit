  # ── Document Types ─────────────────────────────────────────

  /companies/{companyId}/document-types:
    post:
      tags:
        - Document Types
      summary: Create a document type
      description: Creates a single document type for a company. Requires SUPER_ADMIN role.
      parameters:
        - name: companyId
          in: path
          required: true
          description: Company UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentTypeRequest'
      responses:
        '201':
          description: Document type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token not provided or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Document type name already exists for this company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Document Types
      summary: List document types
